<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title id="title"></title><link rel="stylesheet" href="styles.css"></head><body><main class="game-wrap"><h2 id="gameName"></h2><p id="sessionMsg"></p><div class="row"><button id="startBtn">Iniciar sesión</button><button id="endBtn">Finalizar sesión</button><button onclick="location.href='index.html'">Volver</button></div><div id="area"></div></main><script>const GAME_NAME="Quiz Rápido";</script><script src="game-base.js"></script><script>const qs=[['FIFO?','Cola'],['LIFO?','Pila']];let i=0,sc=0;area.innerHTML='<p id=q></p><input id=a><button id=n>Responder</button><p id=m></p>';function r(){if(i>=qs.length){m.textContent='Puntaje '+sc;return;}q.textContent=qs[i][0]}r();n.onclick=()=>{if(a.value===qs[i][1])sc++;a.value='';i++;r();};</script></body></html>
