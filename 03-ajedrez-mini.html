<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title id="title"></title><link rel="stylesheet" href="styles.css"></head><body><main class="game-wrap"><h2 id="gameName"></h2><p id="sessionMsg"></p><div class="row"><button id="startBtn">Iniciar sesión</button><button id="endBtn">Finalizar sesión</button><button onclick="location.href='index.html'">Volver</button></div><div id="area"></div></main><script>const GAME_NAME="Ajedrez Mini";</script><script src="game-base.js"></script><script>area.innerHTML='<p>Mueve el rey: usa flechas</p><p id=m>♔ en (0,0)</p>';let x=0,y=0;onkeydown=e=>{if(e.key=='ArrowUp')y=Math.max(0,y-1);if(e.key=='ArrowDown')y=Math.min(7,y+1);if(e.key=='ArrowLeft')x=Math.max(0,x-1);if(e.key=='ArrowRight')x=Math.min(7,x+1);m.textContent='♔ en ('+x+','+y+')'};</script></body></html>
