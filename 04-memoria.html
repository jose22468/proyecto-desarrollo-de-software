<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title id="title"></title><link rel="stylesheet" href="styles.css"></head><body><main class="game-wrap"><h2 id="gameName"></h2><p id="sessionMsg"></p><div class="row"><button id="startBtn">Iniciar sesión</button><button id="endBtn">Finalizar sesión</button><button onclick="location.href='index.html'">Volver</button></div><div id="area"></div></main><script>const GAME_NAME="Memoria";</script><script src="game-base.js"></script><script>let vals=['A','A','B','B','C','C'];vals.sort(()=>Math.random()-.5);let open=[];vals.forEach(v=>{let b=document.createElement('button');b.textContent='?';b.onclick=()=>{if(open.length===2||b.dataset.ok)return;b.textContent=v;open.push([b,v]);if(open.length===2){if(open[0][1]===open[1][1]){open[0][0].dataset.ok=1;open[1][0].dataset.ok=1;open=[];}else setTimeout(()=>{open[0][0].textContent='?';open[1][0].textContent='?';open=[];},500);}};area.appendChild(b)});</script></body></html>
