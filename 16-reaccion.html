<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title id="title"></title><link rel="stylesheet" href="styles.css"></head><body><main class="game-wrap"><h2 id="gameName"></h2><p id="sessionMsg"></p><div class="row"><button id="startBtn">Iniciar sesión</button><button id="endBtn">Finalizar sesión</button><button onclick="location.href='index.html'">Volver</button></div><div id="area"></div></main><script>const GAME_NAME="Reacción";</script><script src="game-base.js"></script><script>area.innerHTML='<button id=g>Iniciar</button><button id=b>CLICK</button><p id=m></p>';let t=0,ok=false;g.onclick=()=>{ok=false;m.textContent='Espera...';setTimeout(()=>{ok=true;t=performance.now();m.textContent='¡Ahora!';},1000+Math.random()*1500)};b.onclick=()=>{if(ok)m.textContent=Math.round(performance.now()-t)+' ms'};</script></body></html>
