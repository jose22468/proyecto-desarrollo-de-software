<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Biblioteca de Juegos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🎮 Mini Biblioteca de Juegos</h1>
    <p>20 juegos + registro de sesiones por usuario</p>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Ingreso</h2>
      <div class="row">
        <input id="username" placeholder="Usuario" />
        <input id="password" type="password" placeholder="Clave admin" />
        <button id="loginBtn">Entrar</button>
      </div>
      <p id="sessionInfo">Usuario actual: ninguno</p>
      <small>Admin: <b>admin</b> / <b>1234</b></small>
    </section>

    <section class="panel">
      <h2>Juegos</h2>
      <div id="gamesGrid" class="grid"></div>
    </section>

    <section class="panel">
      <h2>Mi registro</h2>
      <div id="myRecord"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
