<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Biblioteca de Juegos - 20 juegos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Pantalla de login -->
        <div id="login-screen" class="screen active">
            <h1>🎮 Biblioteca de 20 Juegos</h1>
            <div class="login-box">
                <h3>Iniciar Sesión</h3>
                <input type="text" id="username-input" placeholder="Usuario" autocomplete="off">
                <button id="btn-login">Entrar</button>
                <button id="btn-admin-toggle" class="secondary">Modo Admin</button>
                <div id="admin-fields" class="hidden">
                    <input type="password" id="admin-pass" placeholder="Contraseña admin">
                    <button id="btn-admin-login">Entrar Admin</button>
                </div>
                <p id="login-msg"></p>
            </div>
        </div>

        <!-- Pantalla de usuario -->
        <div id="user-screen" class="screen">
            <div class="user-info">
                <div>
                    <strong id="user-name-display"></strong>
                    <span id="ingresos-badge" class="badge"></span>
                    <br><small>Último ingreso: <span id="last-login-display"></span></small>
                </div>
                <button id="btn-logout" class="secondary">Cerrar sesión</button>
            </div>
            <div class="menu-buttons">
                <button id="btn-tab-jugar" class="active-tab">🎲 Jugar</button>
                <button id="btn-tab-estadisticas">📊 Mis estadísticas</button>
                <button id="btn-tab-global">🌐 Ranking global</button>
            </div>
            <div id="tab-jugar" class="tab-content">
                <div id="game-grid" class="game-grid"></div>
                <div id="game-container" class="hidden"></div>
                <button id="btn-back-games" class="hidden secondary">← Volver a la lista</button>
            </div>
            <div id="tab-estadisticas" class="tab-content hidden">
                <table class="stats-table" id="mis-stats-table">
                    <thead><tr><th>Juego</th><th>Horas acumuladas</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="tab-global" class="tab-content hidden">
                <table class="stats-table" id="global-stats-table">
                    <thead><tr><th>Juego</th><th>Horas totales</th><th>Usuarios únicos</th></tr></thead>
                    <tbody></tbody>
                </table>
                <p id="most-played-text"></p>
            </div>
        </div>

        <!-- Pantalla de administrador -->
        <div id="admin-screen" class="screen">
            <div class="flex-between">
                <h2>Panel de Administrador</h2>
                <button id="btn-admin-logout" class="secondary">Salir</button>
            </div>
            <div class="admin-panel">
                <select id="admin-user-select">
                    <option value="">-- Selecciona un usuario --</option>
                </select>
                <div id="admin-user-stats"></div>
                <hr>
                <h3>Estadísticas globales</h3>
                <table class="stats-table" id="admin-global-table"></table>
            </div>
        </div>
    </div>

    <script src="game-library.js"></script>
</body>
</html>
