<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title id="title"></title><link rel="stylesheet" href="styles.css"></head><body><main class="game-wrap"><h2 id="gameName"></h2><p id="sessionMsg"></p><div class="row"><button id="startBtn">Iniciar sesión</button><button id="endBtn">Finalizar sesión</button><button onclick="location.href='index.html'">Volver</button></div><div id="area"></div></main><script>const GAME_NAME="Tetris Lite";</script><script src="game-base.js"></script><script src="game-utils.js"></script><script>const ui=createGameShell({instructions:'Limpia 6 líneas para ganar.'});let score=0,started=false,ended=false;function upd(){ui.scoreLabel.textContent='Progreso: '+score+'/'+6;}function finish(win,msg){ended=true;ui.stateLabel.textContent='Estado: fin - '+(win?'victoria':'derrota');ui.feedback.textContent=msg;}const b=document.createElement('button');b.textContent='Acción';b.onclick=()=>{if(ended)return;started=true;ui.stateLabel.textContent='Estado: inicio - en curso';score++;upd();if(score>=6)finish(true,'Victoria conseguida.');};ui.controls.appendChild(b);ui.restartBtn.onclick=()=>{score=0;started=false;ended=false;ui.stateLabel.textContent='Estado: listo (inicio pendiente)';ui.feedback.textContent='Partida reiniciada';upd();};upd();</script></body></html>
