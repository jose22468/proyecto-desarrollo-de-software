<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title id="title"></title><link rel="stylesheet" href="styles.css"></head><body><main class="game-wrap"><h2 id="gameName"></h2><p id="sessionMsg"></p><div class="row"><button id="startBtn">Iniciar sesión</button><button id="endBtn">Finalizar sesión</button><button onclick="location.href='index.html'">Volver</button></div><div id="area"></div></main><script>const GAME_NAME="Gato y Ratón";</script><script src="game-base.js"></script><script>area.innerHTML='<p>🐭 usa flechas para llegar a la meta</p><p id=m>(0,0)</p>';let x=0,y=0;onkeydown=e=>{if(e.key=='ArrowUp')y--;if(e.key=='ArrowDown')y++;if(e.key=='ArrowLeft')x--;if(e.key=='ArrowRight')x++;x=Math.max(0,Math.min(5,x));y=Math.max(0,Math.min(5,y));m.textContent='('+x+','+y+')'+(x===5&&y===0?' meta!':'')};</script></body></html>
